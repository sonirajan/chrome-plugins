<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background-color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Background ── */
    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* subtle darkening so white text pops */
      filter: brightness(0.82);
      opacity: 1;
    }

    /* ── Clock container ── */
    #clock-wrap {
      position: relative;
      z-index: 10;
      text-align: center;
      color: #ffffff;
      /* iOS-style soft text shadow for legibility over any photo */
      text-shadow:
        0 1px 6px rgba(0, 0, 0, 0.35),
        0 2px 24px rgba(0, 0, 0, 0.25);
      user-select: none;
    }

    #time {
      font-size: clamp(80px, 12vw, 140px);
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.1em;
    }

    .ampm {
      font-size: 0.2em;
      font-weight: 400;
      padding-bottom: 0.3em;
    }

    #date {
      margin-top: 0.3em;
      font-size: clamp(22px, 3vw, 38px);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    #today-text {
      margin-top: 0.9em;
      font-size: clamp(20px, 2vw, 32px);
      font-weight: 500;
      letter-spacing: 0.02em;
      opacity: 1;
    }

    #bg, #clock-wrap {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #bg.ready, #clock-wrap.ready {
      opacity: 1;
    }

    body {
      background-color: #111111;  /* near black — blends with any photo */
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div id="clock-wrap">
    <div id="time">00:00</div>
    <div id="date">Sunday, January 1</div>
    <div id="today-text"></div>
  </div>

  <script src="clock.js"></script>

</body>
</html>
